<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Movie</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<a href="movies.html">← Back to Movies</a>

<h2>Edit Movie</h2>

<form id="editMovieForm">
  <label for="title">Title:</label>
  <input type="text" id="title" required>

  <label for="ageLimit">Age limit:</label>
  <input type="number" id="ageLimit" min="0" step="1" required>

  <label for="duration">Duration:</label>
  <input type="number" id="duration" min="0" step="1" required>

  <label for="categoriesContainer">Categories:</label>
  <div id="categoriesContainer"></div>

  <label for="description">Description:</label>
  <textarea id="description" rows="4" required></textarea>

  <button type="submit">Save Movie</button>
</form>

<div id="message"></div>

<script type="module" src="../js/pages/edit-movie.js"></script>

</body>
</html>
