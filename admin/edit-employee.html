<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Employee</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<a href="employees.html">← Back to Employees</a>

<h2>Edit Employee</h2>

<form id="editEmployeeForm">
    <label for="username">Username:</label>
    <input type="text" id="username" required>

    <label for="password">New Password (leave blank to keep current):</label>
    <input type="password" id="password">

    <label for="role">Role:</label>
    <select id="role">
        <option value="ADMIN">Admin</option>
        <option value="TICKET_INSPECTOR">Ticket Inspector</option>
        <option value="TICKET_STAFF">Ticket Staff</option>
        <option value="MOVIE_OPERATOR">Movie Operator</option>
    </select>

    <button type="submit">Save Changes</button>
</form>
<div id="message"></div>

<script type="module" src="../js/pages/edit-employee.js"></script>

</body>
</html>
