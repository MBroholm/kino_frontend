name: push.yml

on:
  push:
    branches: [main]

jobs:
  build-and-push-image:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Normalize repository owner to lowercase for GHCR
      - name: Normalize owner to lowercase
        id: owner
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "value=${OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/kino_frontend:latest
            ghcr.io/${{ steps.owner.outputs.value }}/kino_frontend:${{ github.sha }}

  deploy:
    needs: [build-and-push-image]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/kino-app

            # Pull the latest images
            docker compose -f docker-compose.prod.yml pull

            # Restart with the new images
            docker compose -f docker-compose.prod.yml up -d

            # Clean up old images
            docker image prune -f
